# Offline EAGLE3 training for gpt-oss-120b (dry-run defaults).
# Paths are overridden by 02_train/train.sh via launch_train.sh CLI dotlist args.

metadata:
  recipe_type: speculative_eagle
  description: gpt-oss-120b EAGLE3 offline training

model:
  model_name_or_path: ~/models/gpt-oss-120b
  trust_remote_code: true
  use_fake_base_for_offline: true

data:
  offline_data_path: ~/eagle3-gptoss/hidden_states/gpt-oss-120b

eagle:
  eagle_decoder_type: llama
  eagle_ttt_steps: 3
  eagle_mix_hidden_states: false
  eagle_use_torch_compile: false
  eagle_self_logit_distillation: true
  eagle_freeze_base_model: true
  eagle_loss_decay_factor: 0.9
  eagle_hidden_state_distillation: false
  eagle_reuse_base_decoder: false
  eagle_report_acc: true
  eagle_enable_nvtx: false
  eagle_export_rope_scaling: {}
  eagle_architecture_config:
    num_hidden_layers: 1
    hidden_size: 2880
    intermediate_size: 17280
    num_attention_heads: 64
    num_key_value_heads: 8
    head_dim: 64
    use_aux_hidden_state: true
    use_input_layernorm_in_first_layer: true
    use_last_layernorm: true
    use_mtp_layernorm: false
    eagle_aux_hidden_state_layer_ids: [1, 17, 32]
    max_position_embeddings: 131072
    rope_theta: 500000.0
    rope_scaling:
      rope_type: llama3
      factor: 8.0
      high_freq_factor: 4.0
      low_freq_factor: 1.0
      original_max_position_embeddings: 8192

training:
  output_dir: ~/eagle3-gptoss/ckpt/dry-run
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  bf16: true
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  training_seq_len: 2048
  remove_unused_columns: false
  dataloader_drop_last: true
